# Milestone 2 data-centric improvement config
# Base settings mirror configs/default.yaml with identity cap enabled.

paths:
  data_root: "data"
  out_root: "outputs"
  project_root: "."
  lfw_dir: "lfw"
  images_dir: "images"
  manifests_dir: "manifests"
  pairs_dir: "pairs"
  similarity_score_dir: "similarity_score"

data_source:
  name: "tfds:lfw"  # LFW via official tarball (see src/ingestion.py)
  tfds_split: "train"
  shuffle_files: false

random:
  seed: 1337
  pair_positive_offset: 0
  pair_negative_offset: 1000
  pair_shuffle_offset: 2000

split:
  policy: "identity_disjoint"
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

image:
  size: [250, 250]
  format: "JPEG"
  quality: 95
  filename_template: "{sample_id:06d}.jpg"
  dtype: "uint8"

pairs:
  num_positive_pairs: 3000
  num_negative_pairs: 3000
  policy: "identity_disjoint_verification"
  max_attempts_multiplier: 10
  identity_cap_enabled: true
  max_pairs_per_identity: 120
  description: "Data-centric change: cap pair participation per identity to reduce overrepresentation."

embedding:
  dimension: 100
  normalize: true
  normalization_value: 255.0

similarity:
  epsilon: 1e-12
  metrics: ["cosine", "euclidean"]

ingestion:
  overwrite: false
  deterministic_ordering: true

files:
  samples_csv: "lfw_samples.csv"
  manifest_json: "lfw_manifest.json"
  train_pairs_csv: "train_pairs.csv"
  val_pairs_csv: "val_pairs.csv"
  test_pairs_csv: "test_pairs.csv"
  pair_policy_json: "pair_policy.json"
  train_pairs_scored_csv: "train_pairs_scored.csv"
  val_pairs_scored_csv: "val_pairs_scored.csv"
  test_pairs_scored_csv: "test_pairs_scored.csv"

benchmark:
  num_pairs: 10000
  benchmark_dimension: 100
  tolerance: 1e-6

similarity_threshold:
  range: [0.3, 0.95]
  increment: 0.05
  default: 0.7
